services:
  app:
    image: ${DOCKER_USERNAME}/olx-watcher-bot:${IMAGE_TAG:-latest}
    container_name: olx-watcher-bot
    ports:
      - "${APP_PORT:-80}:80"
    env_file:
      - .env
    volumes:
      - storage_logs:/var/www/html/storage/logs
      - storage_app:/var/www/html/storage/app
    restart: unless-stopped

volumes:
  storage_logs:
    driver: local
  storage_app:
    driver: local
